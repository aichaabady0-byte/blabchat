<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface de Gestion</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
        }

        /* Barre de navigation */
        .nav-container {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn-main {
            padding: 12px 25px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: white;
            color: #333;
            transition: all 0.2s;
        }

        .btn-main:hover {
            background-color: #e9ecef;
        }

        /* Conteneur principal */
        .content-section {
            display: none;
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* En-tête de la section Présentation */
        .header-pres {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .btn-add {
            width: 35px;
            height: 35px;
            font-size: 20px;
            cursor: pointer;
            border: 1px solid #ccc;
            background: #fff;
            font-weight: bold;
        }

        /* Bouton Clones En Stock */
        .btn-download {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #f8f9fa;
            color: #212529;
            text-align: left;
            text-decoration: none;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            font-size: 15px;
            cursor: pointer;
        }

        .btn-download:hover {
            background-color: #e2e6ea;
            border-color: #adb5bd;
        }

        .empty-msg {
            text-align: center;
            color: #6c757d;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="nav-container">
        <button class="btn-main" onclick="showSection('presentations')">Présentations</button>
        <button class="btn-main" onclick="showSection('videos')">Vidéos</button>
        <button class="btn-main" onclick="showSection('documents')">Documents</button>
    </div>

    <!-- Section Présentations -->
    <div id="presentations" class="content-section" style="display: block;">
        <div class="header-pres">
            <button class="btn-add" title="Ajouter">+</button>
        </div>
        <div class="list">
            <!-- Le lien pointe vers le dossier parent -->
            <a href="../bonjour.odp" download="bonjour.odp" class="btn-download">
                Clones En Stock - Présentation
            </a>
        </div>
    </div>

    <!-- Section Vidéos -->
    <div id="videos" class="content-section">
        <p class="empty-msg">Le dossier Vidéos est vide.</p>
    </div>

    <!-- Section Documents -->
    <div id="documents" class="content-section">
        <p class="empty-msg">Le dossier Documents est vide.</p>
    </div>

    <script>
        function showSection(id) {
            // Cacher toutes les sections
            const sections = document.querySelectorAll('.content-section');
            sections.forEach(s => s.style.display = 'none');
            
            // Afficher la section sélectionnée
            document.getElementById(id).style.display = 'block';
        }
    </script>

</body>
</html>
