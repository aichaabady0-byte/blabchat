<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlabChat Space</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <section id="page-discover" class="page active">
        <div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
        <nav class="top-nav">
            <div class="logo">🚀 <span class="logo-text">BLABCHAT</span></div>
            <div class="auth-buttons">
                <button class="btn-ghost" onclick="showAuth('login')">Connexion</button>
                <button class="btn-primary" onclick="showAuth('register')">S'inscrire</button>
            </div>
        </nav>
        <main class="hero">
            <h1 class="hero-title">Le Chat <span class="gradient-text">Premium</span></h1>
            <p class="hero-sub">Propulsé par Firebase. Design par Fufu.</p>
            <button class="btn-primary btn-large" onclick="showAuth('register')">Commencer</button>
        </main>
    </section>

    <section id="page-app" class="page">
        <div class="app-layout">
            <aside class="sidebar-servers">
                <div class="server-home" onclick="switchServer('global', 'Général')">🏠</div>
                <div class="server-divider"></div>
                <div id="server-list" class="server-list"></div>
                <button class="server-add" onclick="createNewServer()">+</button>
            </aside>

            <aside class="sidebar-channels">
                <div class="channels-header">
                    <span id="current-server-name" class="channels-title">GLOBAL</span>
                </div>
                <div class="channel-group">
                    <div class="channel-group-header">
                        <span>SALONS</span>
                        <button onclick="createNewChannel()" class="add-ch-btn">+</button>
                    </div>
                    <div id="channel-list"></div>
                </div>
                <div class="user-bar">
                    <div class="user-bar-avatar" id="my-avatar">?</div>
                    <div class="user-bar-info">
                        <span class="user-bar-name" id="my-name">...</span>
                        <span class="user-bar-status">En ligne</span>
                    </div>
                    <button class="logout-btn" onclick="logout()">✕</button>
                </div>
            </aside>

            <main class="main-area">
                <header class="main-header">
                    <span class="header-hash">#</span>
                    <h3 id="current-channel-display">général</h3>
                </header>
                <div id="chat-messages" class="chat-messages"></div>
                <div class="chat-input-area">
                    <div class="chat-input-box">
                        <input type="text" id="msgInput" placeholder="Message...">
                        <button id="sendBtn" class="input-send">➤</button>
                    </div>
                </div>
            </main>

            <aside class="sidebar-members">
                <div class="members-label">MEMBRES</div>
                <div id="members-list" class="members-list"></div>
                <div class="friend-zone">
                    <input type="text" id="friendUser" placeholder="Ajouter ami...">
                    <button onclick="addFriend()">+</button>
                </div>
            </aside>
        </div>
    </section>

    <div id="modal-container" class="modal-overlay hidden">
        <div class="modal">
            <h2 id="modal-title">Bienvenue</h2>
            <div id="group-user" class="form-group"><input type="text" id="auth-user" placeholder="Pseudo"></div>
            <div class="form-group"><input type="email" id="auth-email" placeholder="Email"></div>
            <div class="form-group"><input type="password" id="auth-pass" placeholder="Password"></div>
            <button id="auth-submit" class="btn-primary btn-full">Confirmer</button>
            <button class="btn-ghost btn-full" onclick="closeAuth()">Annuler</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
