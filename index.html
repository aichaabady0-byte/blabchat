<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlabChat Space</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- PAGE DE DÉCOUVERTE (DISCOVER) -->
    <section id="page-discover" class="page active">
        <nav class="top-nav">
            <div class="logo">BlabChat 🚀</div>
            <div class="auth-buttons">
                <button onclick="showModal('login')">Connexion</button>
                <button class="btn-main" onclick="showModal('register')">S'inscrire</button>
            </div>
        </nav>
        <div class="hero">
            <h1>Découvrez l'univers BlabChat</h1>
            <p>Le chat nouvelle génération. Rejoignez la communauté Fufu.</p>
        </div>
    </section>

    <!-- APPLICATION PRINCIPALE (CACHÉE AVANT CONNEXION) -->
    <section id="page-app" class="page">
        <div class="app-container">
            <aside class="sidebar-left">
                <div id="server-list" class="icon-stack">
                    <div class="icon active" onclick="switchTab('main-chat')">🏠</div>
                </div>
                <button class="add-icon" onclick="createServer()">+</button>
            </aside>

            <main class="content-area">
                <header class="content-header">
                    <h3 id="current-title">Général</h3>
                    <div class="user-pill">
                        <span id="user-display">Pseudo</span>
                        <span id="verified-badge" class="badge hidden">VÉRIFIÉ</span>
                        <button onclick="logout()" class="btn-logout">X</button>
                    </div>
                </header>

                <div id="tab-main-chat" class="tab-content active">
                    <div id="admin-panel" class="admin-bar hidden">
                        <span>Panel Fufu :</span>
                        <button>Modération</button>
                        <button>Broadcast</button>
                    </div>
                    <div id="chat-messages"></div>
                    <div class="chat-input">
                        <input type="text" id="msgInput" placeholder="Envoyer un message...">
                        <button id="sendBtn">➤</button>
                    </div>
                </div>
            </main>

            <aside class="sidebar-right">
                <h4>Amis</h4>
                <div id="friends-list"></div>
                <div class="add-friend-box">
                    <input type="text" id="friendUser" placeholder="Username...">
                    <button id="addFriendBtn">Ajouter</button>
                </div>
            </aside>
        </div>
    </section>

    <!-- MODALES AUTH -->
    <div id="modal-overlay" class="hidden">
        <div class="modal">
            <h2 id="modal-title">Connexion</h2>
            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-pass" placeholder="Mot de passe">
            <input type="text" id="auth-user" class="hidden" placeholder="Username (pour inscription)">
            <button id="auth-submit">Valider</button>
            <button onclick="closeModal()" class="btn-close">Annuler</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
